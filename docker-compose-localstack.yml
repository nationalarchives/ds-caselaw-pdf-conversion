---
version: "2.1"
services:
  localstack:
    image: localstack/localstack@sha256:305b4e56e12251c26ba4524815769cdf886a3b0666472d2934e30798657df8d9
    network_mode: bridge
    environment:
      SERVICES: sns,s3,sqs
      DEBUG: 0
    ports:
      - 4566:4566
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
