---
version: "2.1"
services:
  localstack:
    image: localstack/localstack@sha256:d75e196341a86825dd1510967523ed18e284457cca54cb7ac448981a60f144ec
    network_mode: bridge
    environment:
      SERVICES: sns,s3,sqs
      DEBUG: 0
    ports:
      - 4566:4566
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
