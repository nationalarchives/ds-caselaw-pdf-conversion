---
version: "2.1"
services:
  localstack:
    image: localstack/localstack@sha256:0111edc2d22a0535ea544f07eea57c02fd9f21856e426a698419e9cae179c915
    network_mode: bridge
    environment:
      SERVICES: sns,s3,sqs
      DEBUG: 0
    ports:
      - 4566:4566
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
