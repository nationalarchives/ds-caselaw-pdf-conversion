---
version: "2.1"
services:
  localstack:
    image: localstack/localstack@sha256:099992fc62f21f3f07f0da107e828b86fda611f79e9586b452d0def943c66b57
    network_mode: bridge
    environment:
      SERVICES: sns,s3,sqs
      DEBUG: 0
    ports:
      - 4566:4566
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
